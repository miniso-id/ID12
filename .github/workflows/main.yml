name: Weekly Repo Clean
on:
  schedule:
    # Berjalan otomatis setiap hari Minggu jam 00:00 UTC
    - cron: '0 0 * * 0' 
  workflow_dispatch: # Tombol manual tetap ada untuk jaga-jaga

jobs:
  clean-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Buat branch sementara tanpa riwayat
          git checkout --orphan latest_branch
          git add -A
          git commit -m "Auto-clean: Snapshot $(date)"
          
          # Hapus branch master lama dan ganti dengan yang baru
          # Kita pakai 'master' karena repo Anda menggunakan nama itu
          git branch -D master || true
          git branch -m master
          
          # Push paksa ke origin untuk reset total di web GitHub
          git push origin master --force
